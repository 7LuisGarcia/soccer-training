{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-lg border-0 rounded-4 p-5 text-center mx-auto"
        style="max-width: 700px;">

        <div class="mb-4">
            <i class="bi bi-check-circle-fill text-success"
            style="font-size: 5rem;"></i>
        </div>

        <h1 class="fw-bold text-success mb-3">
            Payment Successful
        </h1>

        <p class="text-muted fs-5 mb-4">
            Your subscription has been activated successfully.
        </p>

        <div class="bg-light rounded-4 p-4 mb-4">
            <h4 class="fw-bold mb-3">
                Welcome to Soccer Training Planner ⚽
            </h4>

            <p class="text-muted mb-0">
                Your premium features are now available.
            </p>
        </div>

        <div class="d-flex justify-content-center gap-3 flex-wrap">

            <a href="{% url 'planner:dashboard' %}"
            class="btn btn-success px-4 py-2 fw-bold rounded-pill">
                Go To Dashboard
            </a>

            <a href="{% url 'planner:home' %}"
            class="btn btn-outline-success px-4 py-2 fw-bold rounded-pill">
                Back Home
            </a>

        </div>

    </div>

</div>

{% endblock %}
