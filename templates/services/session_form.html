{% extends 'base.html' %}
{% block content %}

<div class="container py-5 fade-in">

    <!-- HEADER -->
    <div class="mb-4">
        <h1 class="fw-bold">Create Training Session</h1>
        <p class="text-muted fs-5">
            Add a new training session with key details and notes.
        </p>
    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <form method="POST" action="{% url 'planner:session_create' %}">
                {% csrf_token %}

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Session Title</label>
                    <input type="text" name="title" class="form-control form-control-lg"
                           placeholder="e.g., Passing & Possession Session" required>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" name="date" class="form-control form-control-lg" required>
                </div>

                <!-- Duration -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Duration (minutes)</label>
                    <input type="number" name="duration" class="form-control form-control-lg"
                           placeholder="e.g., 90" min="1" required>
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control form-control-lg" rows="4"
                              placeholder="Optional notes about the session..."></textarea>
                </div>

                <!-- BUTTONS -->
                <div class="d-flex justify-content-between">
                    <a href="{% url 'planner:home' %}" class="btn btn-outline-secondary btn-lg px-4">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-primary btn-lg fw-bold px-4">
                        Create Session
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
