{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'register.css' %}">
{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4 auth-card">

    <h2 class="text-center mb-2 fw-bold">Create your account</h2>
    <p class="text-center text-muted mb-4">Start planning your soccer training sessions.</p>

    <form method="POST" action="{% url 'planner:register' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password1" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">Already have an account?</small><br>

{% endblock %}
