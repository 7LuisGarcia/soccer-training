{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'login.css' %}">
{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
<div class="card shadow-lg border-0 rounded-4 p-4 p-md-5 auth-card" style="max-width: 520px; width: 100%;">

    <div class="text-center mb-4">
    <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
        style="width: 72px; height: 72px;">
        <i class="bi bi-shield-lock-fill fs-1"></i>
    </div>

    <h2 class="fw-bold mb-2">Reset Password</h2>

    <p class="text-muted mb-0">
        Enter your email address and we’ll send you a secure reset link.
    </p>
    </div>

    <form method="POST" novalidate>
    {% csrf_token %}

    {% if form.email.errors %}
        <div class="alert alert-danger rounded-3">
        {{ form.email.errors.0 }}
        </div>
    {% endif %}

    <div class="mb-4">
        <label for="{{ form.email.id_for_label }}" class="form-label fw-semibold">
        Email Address
        </label>

        <input
        type="email"
        name="email"
        id="{{ form.email.id_for_label }}"
        class="form-control form-control-lg rounded-3"
        placeholder="Enter your email"
        required
        >
    </div>

    <button type="submit" class="btn btn-success w-100 py-3 fw-bold rounded-pill">
        Send Reset Link
    </button>
    </form>

    <div class="text-center mt-4">
    <a href="{% url 'planner:login' %}" class="text-success fw-semibold text-decoration-none">
        Back to Login
    </a>
    </div>

</div>
</div>

{% endblock %}
