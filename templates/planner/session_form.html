{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-5">

            <h1 class="fw-bold mb-3">Create Training Session</h1>

            <p class="text-muted mb-4">
                Add a new training session to your coaching planner.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Session Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="Enter session title"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Date
                    </label>

                    <input
                        type="date"
                        name="date"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Duration (minutes)
                    </label>

                    <input
                        type="number"
                        name="duration"
                        class="form-control"
                        placeholder="90"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Notes
                    </label>

                    <textarea
                        name="notes"
                        class="form-control"
                        rows="5"
                        placeholder="Describe the session objectives..."
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-success fw-bold px-4">
                    Save Session
                </button>

                <a href="{% url 'planner:dashboard' %}"
                class="btn btn-outline-secondary ms-2">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

{% endblock %}
